<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>누적합</title>
</head>
    <body>
        <input id="n" type="number" placeholder="정수를 입력하거라">
        <button id="b" type="button">입력</button>
        <div id="result">누적합</div>
    </body>
</html>
<script>
    document.getElementById('b').onclick = function () {
        const n = document.getElementById('n').value
        let result = null
        for (let i = 1; i <= n; i++) {
            result += i
        }
        document.getElementById('result').textContent = '누적합:' + result
    }
</script>
