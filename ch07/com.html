<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <h1>미성년자 판별</h1>
        <input id="input_age" type="number" value="282">
        <button id="btn_ok">확인</button>
        <div id="result">성인일까요 미성년자일까요?</div>
    </body>
    <script>
        document.getElementById("btn_ok").onclick = function () {
            let age = document.getElementById("input_age").value
            let result = null
            if (age >= 20) {
                result = '성인'
            } else {
                result = '미성년자'
            }
            document.getElementById("result").textContent = result + "이구나"
        }
    </script>
</html>
