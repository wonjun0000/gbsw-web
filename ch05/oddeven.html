<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홀짝 구분</title>
    </head>
    <body>
        <h1>홀수 짝수 구분</h1>
        <input
        id="input_number"
        type="number" 
        placeholder="점수를 입력하세요.">
        <button id="btn" type="button">완료</button>
        <div id="result'">이히히</div>
    </body>
</html>
<script>
    //버튼에 Click 이번트 등록
    document.getElementById("btn").onclick = function () {
        //input값 조회
        const num = document.getElementById("input_number").value
        alert(num)
        let result = null
        //홀짝구분
        if (num % 2 == 0) {
            result = '우왕 짝수에요옹'
        } else {
            result = '좌왕 홀수에요옹'
        }
        //result라는 id를 자니 div 태그 내용을 result로 변경
        document.getElementById("result")
    }
</script>
