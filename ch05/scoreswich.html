<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <body>
        <input id="n" type="number" placeholder="점수 입력">
        <button id="b" type="button">입력</button>
        <div id="result">성적</div>
    </body>
</html>
<script>
    document.getElementById('b').onclick = function () {
        const n1 = document.getElementById('n').value
        let num = null
         if (n1 > 100 || n1 < 0) {
            num = "err"
            
        }else{
        switch(Math.trunc(n1/10)) {
            case 9:
            case 10:
                num = 'A'
                break
            case 8:
                num = 'B'
                break
            case 7:
                num = 'C'
                break
            case 6:
                num = 'D'
                break
            default:
                num = 'F'
                break
        }
    }
    document.getElementById('result').textContent = num
    }
</script>
