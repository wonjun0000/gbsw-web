<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./test.css" rel="stylesheet">
</head>
<body>
    <div class="wrap">
        <h1>우리 반 간시 소개 & 추첨</h1>
        <p>친구들과 먹고 싶은 간식을 추가하고 추첨하는 웹페이지 입니다.</p>
        <img src="./snackbar-hero.png" alt="간식 사진">
        <div class="menu_box">
            <h2>인기 간식</h2>
            <ul id="menu_list"></ul>
        </div>
        <div class="menu_box">
            <h2>간식 추가하기</h2>
            <input id="input_snack" type="text" placeholder="추가할 간식 이름.">
            <button id="btn_add">추가</button>
        </div>
        <div class="event_box">
            <h2>오늘의 간식</h2>
            <p id="event_result">버튼을 누르면 간식이 추첨 됩니다.</p>
            <button id="btn_event">간식 추첨</button>
        </div>
    </div>
    <script src="./test.js"></script>
</body>
</html>
