<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="./randomsnack.css" rel="stylesheet">
</head>
<body>
    <div class="wrap">
        <h1>우리반 간식 소개</h1>
        <p>친구들과 먹고 싶은 간식을 소개하는 웹 페이지 입니다.</p>
        <img src="./pepe.jpeg" alt="페페입니다."/>
        <div class="menu_box">
            <h2>인기 간식</h2>
            <ul id="menu_list"></ul>
        </div>
        <div class="menu_box">
            <input id="input_snack" type="text" placeholder="추가할 간식 이름을 입력하시오.">
            <button id="btn_add">추가</button>
        </div>
        <div class="event_box">
            <h2>오늘의 간식</h2>
            <p id="event_result">결과값 영역</p>
            <button id="btn_event">추첨하기</button>
        </div>
    </div>
    <script src="./randomsnack.js"></script>
</body>
</html>
